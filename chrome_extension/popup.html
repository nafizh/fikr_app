<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 350px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 15px; margin: 0; background: #f9f9f9; color: #222; }
        h3 { margin-top: 0; margin-bottom: 15px; font-size: 22px; font-family: "Georgia", serif; font-weight: 700; letter-spacing: -0.5px; color: #222; }
        input, textarea { 
            width: 100%; 
            margin-bottom: 10px; 
            box-sizing: border-box; 
            padding: 8px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            font-family: inherit;
            font-size: 13px;
        }
        input:focus, textarea:focus { outline: none; border-color: #ef476f; }
        textarea { resize: vertical; }
        
        /* Primary Button */
        button#save { 
            width: 100%; 
            padding: 10px; 
            background: #ef476f; /* Pink/Red from main UI */
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 4px; 
            font-weight: 600; 
            font-size: 14px;
        }
        button#save:hover { background: #d63d60; }
        
        .status { font-size: 12px; color: #006621; margin-top: 10px; display: none; text-align: center; font-weight: bold; }

    /* Autocomplete & AI Styles */
    .tag-suggestions {
        position: absolute;
        background: white;
        border: 1px solid #ccc;
        border-top: none;
        list-style: none;
        margin: 0;
        padding: 0;
        max-height: 100px;
        overflow-y: auto;
        z-index: 1000;
        display: none;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .tag-suggestions li {
        padding: 6px 10px;
        cursor: pointer;
        font-size: 13px;
    }
    .tag-suggestions li:hover {
        background: #f0f0f0;
    }
    .ai-btn {
        background: #673ab7; /* Purple for AI */
        color: white;
        border: none;
        border-radius: 4px;
        padding: 6px 12px;
        margin-bottom: 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }
    .ai-btn:hover {
        background: #5e35b1;
    }
    .ai-btn:disabled {
        background: #b39ddb;
        cursor: wait;
    }
    .ai-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: 10px;
    }
    .chip {
        background: #f3e5f5;
        color: #4a148c;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 11px;
        cursor: pointer;
        border: 1px solid #d1c4e9;
    }
    .chip:hover {
        background: #e1bee7;
    }
    
    /* Wrap input for positioning */
    .tag-input-container { position: relative; }
    </style>
</head>
<body>
    <h3>Fikr</h3>
    
    <input type="text" id="title" placeholder="Title">
    
    <div class="tag-input-container">
        <input type="text" id="tags" placeholder="Tags (space separated)">
        <ul id="tag-suggestions" class="tag-suggestions"></ul>
    </div>

    <button id="ai-btn" type="button" class="ai-btn">✨ AI Suggestions</button>
    <div id="ai-chips" class="ai-chips"></div>

    <textarea id="desc" rows="3" placeholder="Description (optional)"></textarea>
    <input type="hidden" id="url">
    
    <button id="save">Save Bookmark</button>
    <div id="status" class="status">Saved!</div>
    
    <script src="popup.js"></script>
</body>
</html>
